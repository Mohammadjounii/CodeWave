<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <!-- Background (black) -->
  <rect width="200" height="80" fill="#000000"/>
  
  <!-- Hexagon outline -->
  <polygon points="100,20 120,30 120,50 100,60 80,50 80,30" 
           fill="none" 
           stroke="#FFFFFF" 
           stroke-width="2"/>
  
  <!-- Wavy arrow line inside hexagon -->
  <path d="M 40 40 Q 70 30, 90 40 Q 110 50, 130 40 Q 150 30, 160 40" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="2.5" 
        stroke-linecap="round"/>
  
  <!-- Arrow head -->
  <polygon points="160,40 155,35 155,45" 
           fill="#FFFFFF"/>
  
  <!-- Opening curly brace -->
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">{</text>
  
  <!-- Closing curly brace -->
  <text x="170" y="45" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">}</text>
  
  <!-- Small star/sparkle in bottom right -->
  <path d="M 185 70 L 187 65 L 189 70 L 194 72 L 189 74 L 187 79 L 185 74 L 180 72 Z" 
        fill="#FFFFFF" 
        opacity="0.8"/>
</svg>

